version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nl2sql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nl2sql}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nl2sql_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-ecommerce}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/seed/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/seed/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nl2sql} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl2sql_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENROUTER_API_KEY:  ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL:    ${OPENROUTER_MODEL:-openrouter/auto}
      DATABASE_URL:        postgresql://${POSTGRES_USER:-nl2sql}:${POSTGRES_PASSWORD:-nl2sql_secret}@postgres:5432/${POSTGRES_DB:-ecommerce}
      CHROMA_PERSIST_DIR:  /app/chroma_data
      MAX_RETRIES:         ${MAX_RETRIES:-3}
      SQL_SAFETY_ENABLED:  true
      CORS_ORIGINS:        http://localhost:3000,http://frontend:80
      LOG_LEVEL:           INFO
    volumes:
      - chroma_data:/app/chroma_data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nl2sql_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pg_data:
  chroma_data:
